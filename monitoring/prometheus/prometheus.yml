global:
  scrape_interval: 5s
  evaluation_interval: 5s
  external_labels:
    environment: local
    project: boston-housing-mlops

scrape_configs:
  - job_name: boston-housing-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: api
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          service: prometheus
